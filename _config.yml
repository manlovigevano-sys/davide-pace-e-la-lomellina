# ==============================================================
# WAX CONFIGURATION
# ==============================================================
# Jekyll configuration files are written in YAML format.
# Colons, tabs/spacing, and quotes are meaningful in YAML.
# It is recommended you look at the following guide to avoid
# syntax errors in this file:
# ~> https://learnxinyminutes.com/docs/yaml/
#
#
# Questions ?
# ~> https://minicomp.github.io/wiki/#/
#
# ---------------------------------------------------------------
# MAIN SETTINGS
# ---------------------------------------------------------------
# Feel free to change these! For more info, refer to:
# ~> https://jekyllrb.com/docs/configuration/options/

title:            'Davide Pace e la Lomellina'
tagline:          'Mostra digitale'
description:      'Riconnettere l’archivio ai reperti: dai luoghi di rinvenimento al museo'
url:              "https://manlovigevano-sys.github.io"
baseurl:          "/davide-pace-in-lomellina"
copyright:        'Direzione regionale Musei Nazionali Lombardia - Museo Archeologico Nazionale della Lomellina'
logo:             '/assets/logo.png'
default_thumb:    '/assets/default.png'

# ---------------------------------------------------------------
# BUILD SETTINGS
# ---------------------------------------------------------------
# Best not to mess with these unless you know what you're doing!

permalink: 'pretty'
sass:
  style: compressed
exclude: ["Gemfile*", "*.gemspec", "Rakefile", "vendor", "spec", "README.md", "LICENSE.txt", "Docker*", "outputs", ".local-iiif-archive", ".local-server-root", ".local-backups", ".bundle", "node_modules", ".jekyll-cache", ".sass-cache"]
webrick:
  headers:
    'Access-Control-Allow-Origin': '*'
kramdown:
 auto_ids:       true
 footnote_nr:    1
 entity_output:  as_char
 footnote_backlink: "&#x21a9;&#xfe0e;"
 toc_levels:     1..6
 smart_quotes:   lsquo,rsquo,ldquo,rdquo
 enable_coderay: false


# --------------------------------------------------------------
# COLLECTION SETTINGS
# --------------------------------------------------------------
# Wax leverages Jekyll collections for much of its
# functionality, therefor some of the keys below are from
# Jekyll while others are Wax-specific.
# For more info, refer to:
# ~> https://jekyllrb.com/docs/collections/

collections:
  exhibits:
    output: true
  pace:
    output: true
    layout: 'pace_item'
    metadata:
      source: 'pace.csv'
    images:
      source: 'raw_images/pace'

# --------------------------------------------------------------
# SEARCH INDEX SETTINGS
# --------------------------------------------------------------
# You can create multiple search indexes below (though only one is
# recommended!) by specifying
# an `index` file to write it to and some `collections` for it to index
# and running `$ bundle exec rake wax:search` .

search:
  main:
    index: '/search/index.json' # file the index will get written to
    collections:
      exhibits:
        content: true # whether or not to index page content
        fields: # the metadata fields to index
          - title
          - label
          - subtitle
          - topic
          - summary
          - keywords
      pace:
        content: true
        fields:
          - title
          - label
          - summary
          - object_type
          - media_type
          - creator
          - date
          - place
          - repository
          - reference
          - extent
          - subjects
          - subject_vocabularies
          - description
          - rights
          - current_location
          - exhibit_section

# --------------------------------------------------------------
# SITE MENU SETTINGS
# --------------------------------------------------------------
# Each menu item needs a `label` (whats shown), and a `link`
# (where it goes). An item can optionally have a dropdown
# submenu via `sub`.

menu:
  - label: 'Progetto'
    sub:
      - label: 'Il progetto'
        link: '/pages/progetto/'
      - label: 'Davide Pace'
        link: '/pages/davide-pace/'
      - label: 'Dal territorio al museo'
        link: '/pages/territorio-museo/'
      - label: 'Fondo Pace'
        link: '/pages/archivio-sia/'
  - label: 'Mostra digitale'
    sub:
      - label: 'Introduzione alla mostra'
        link: '/exhibits/'
      - label: 'La tomba dell’abbraccio'
        link: '/exhibits/tomba-abbraccio/'
      - label: 'Comunità locale e tutela'
        link: '/exhibits/comunita-locale/'
      - label: 'Documentare l’invisibile'
        link: '/exhibits/documentare-invisibile/'
  - label: 'Ricerca'
    link: '/search/'
  - label: 'Collezione'
    link: '/collection/'
  - label: 'Crediti'
    link: '/crediti/'

# --------------------------------------------------------------
# SITE FOOTER SETTINGS
# --------------------------------------------------------------
#

footer:
  links:
    - label: 'Museo Archeologico Nazionale della Lomellina'
      link: 'https://musei.lombardia.beniculturali.it/musei/museo-archeologico-nazionale-della-lomellina/'
    - label: 'Crediti'
      link: '/crediti/'
    - label: 'Ricerca'
      link: '/search/'
  logos:
    - img: '/img/logo.png'

# FIN
